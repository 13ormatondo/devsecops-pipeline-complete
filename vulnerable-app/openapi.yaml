openapi: 3.0.0
info:
  title: Vulnerable API
  version: 1.0.0
paths:
  /:
    get:
      parameters:
        - name: name
          in: query
          schema:
            type: string
  /login:
    post:
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
  /ping:
    get:
      parameters:
        - name: ip
          in: query
          schema:
            type: string
  /user/{user_id}:
    get:
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
  /health:
    get:
      responses:
        '200':
          description: Health check
